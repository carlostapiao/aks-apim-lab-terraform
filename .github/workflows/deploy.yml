name: Full AKS + APIM CI/CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Terraform Init & Apply
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve

    - name: Build microservices in ACR
      run: |
        az acr build --registry Carlos69lamejor --image app1:v1 ../app/app1
        az acr build --registry Carlos69lamejor --image app2:v1 ../app/app2
        az acr build --registry Carlos69lamejor --image app3:v1 ../app/app3

    - name: Deploy to AKS
      run: |
        az aks get-credentials --resource-group rg-k8s-lab --name aks-lab5
        kubectl apply -f k8s/apps.yaml